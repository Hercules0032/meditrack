services:
  - type: web
    name: meditrack
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /login
    envVars:
      - key: APP_KEY
        sync: false          # paste your base64 key in the Render dashboard
      - key: APP_URL
        sync: false          # set to your https://<service>.onrender.com URL
      - key: APP_NAME
        value: MediTrack
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/html/database/database.sqlite
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
